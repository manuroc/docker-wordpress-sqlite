

app = 'docker-wordpress-sqlite'
primary_region = 'nrt'

[build]

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']
  protocol = 'tcp'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256

[mounts]
  source = 'wp_data'
  destination = '/var/www/wp-content'

[env]
  FS_METHOD = 'direct'
